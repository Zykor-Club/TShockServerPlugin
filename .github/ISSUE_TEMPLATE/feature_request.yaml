name: 功能建议 | Feature Request
description: 建议新功能或改进 | Suggest an idea or improvement
title: '[FEATURE] '
labels: enhancement
body:
  - type: textarea
    attributes:
      label: 你的建议 | Your Suggestion
      description: 清晰描述你希望看到的功能
    validations:
      required: true
  - type: textarea
    attributes:
      label: 使用场景 | Use Case
      description: 这个功能在什么场景下有用？
    validations:
      required: false
  - type: textarea
    attributes:
      label: 其他信息 | Additional Context
      description: 补充说明（可选）
